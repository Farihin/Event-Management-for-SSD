{% extends "base.html" %}
{% block title %}Account temporarily locked{% endblock %}
{% block content %}
<div class="error-page">
    <div class="code text-danger">423</div>
    <h1 class="h4">Too many failed login attempts</h1>
    <p class="text-muted">
        For your security, this account has been temporarily locked. Please try
        again later or reset your password.
    </p>
    <a href="{% url 'accounts:password_reset' %}" class="btn btn-primary">Reset password</a>
</div>
{% endblock %}
