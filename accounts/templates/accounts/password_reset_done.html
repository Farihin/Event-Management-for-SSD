{% extends "base.html" %}
{% block title %}Reset link sent{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <h1 class="h4 mb-3">Check your email</h1>
        <p class="text-muted">
            If an account exists for the email you entered, a password reset link
            has been sent. (In development the email is printed to the server console.)
        </p>
        <a href="{% url 'accounts:login' %}" class="btn btn-primary">Back to login</a>
    </div>
</div>
{% endblock %}
